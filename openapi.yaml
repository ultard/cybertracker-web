              - type: "null"
            title: Login
        - name: role
          in: query
          required: false
          schema:
            anyOf:
              - $ref: "#/components/schemas/UserRole"
              - type: "null"
            title: Role
        - name: is_active
          in: query
          required: false
          schema:
            anyOf:
              - type: boolean
              - type: "null"
            title: Is Active
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Page_UserRead_"
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
  /api/users/me:
    get:
