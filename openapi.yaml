openapi: 3.1.0
info:
  title: CyberTracker
  description: REST API для киберспорт-арены.
  version: 0.1.0
paths:
  /api/auth/register:
    post:
      tags:
        - Авторизация
      summary: Регистрация
      description: Создаёт учётную запись.
      operationId: register_api_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
        required: true
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "409":
          description: логин уже занят
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        "500":
          description: роли не инициализированы
  /api/auth/login:
    post:
      tags:
        - Авторизация
      summary: Вход
      description: Выполняет вход в систему.
      operationId: login_api_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: неверные учётные данные или пользователь не активен
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        "429":
          description: превышен лимит запросов
  /api/auth/refresh:
    post:
      tags:
        - Авторизация
      summary: Обновить токены
      operationId: refresh_tokens_api_auth_refresh_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
        required: true
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: токен невалиден
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
        "429":
          description: превышен лимит запросов
  /api/auth/logout:
    post:
      tags:
        - Авторизация
      summary: Выход
      operationId: logout_api_auth_logout_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
        required: true
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: boolean
                type: object
                title: Response Logout Api Auth Logout Post
        "401":
          description: токен невалиден
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
      security:
        - HTTPBearer: []
  /api/auth/me:
    get:
      tags:
        - Авторизация
      summary: Текущий пользователь
      description: Возвращает данные авторизованного пользователя.
      operationId: me_api_auth_me_get
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: требуется авторизация
      security:
        - HTTPBearer: []
  /api/users:
    get:
      tags:
        - Пользователи
      summary: Список пользователей
      operationId: list_users_api_users_get
      security:
        - HTTPBearer: []
      parameters:
        - name: skip
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
            title: Skip
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            maximum: 200
            minimum: 1
            default: 20
            title: Limit
        - name: login
          in: query
          required: false
          schema:
            anyOf:
